services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: taskpilot-postgres-test
    ports:
      - "127.0.0.1:5436:5432"
    environment:
      POSTGRES_USER: ${TP_DB_USER:-taskpilot}
      POSTGRES_PASSWORD: ${TP_DB_PASSWORD:-taskpilot_test_2026}
      POSTGRES_DB: ${TP_DB_NAME:-taskpilot_test}
    volumes:
      - /data/taskpilot/postgres/test:/var/lib/postgresql/data
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskpilot"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../src/backend
      dockerfile: ../../docker/Dockerfile.backend
    container_name: taskpilot-backend-test
    ports:
      - "127.0.0.1:8100:8000"
    env_file:
      - ../.env.test
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../src/frontend
      dockerfile: ../../docker/Dockerfile.frontend
    container_name: taskpilot-frontend-test
    ports:
      - "127.0.0.1:3100:80"
    depends_on:
      - backend
    restart: unless-stopped
