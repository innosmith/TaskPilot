# Integration Environment: Backend + Frontend (gebaute Images)
# Nutzt shared Postgres + LiteLLM + ClamAV aus docker-compose.yml
#
# Starten mit:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.integration.yml --profile clamav up -d
#
# Oder via Makefile: make int

services:
  backend-int:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: taskpilot-backend-int
    ports:
      - "127.0.0.1:8100:8000"
    env_file: ../.env.integration
    environment:
      TP_APP_ENV: int
      TP_DB_HOST: postgres
      TP_DB_PORT: "5432"
      TP_DEBUG: "true"
      TP_LITELLM_BASE_URL: http://litellm:4000
      TP_OLLAMA_BASE_URL: http://host.docker.internal:11434
      TP_INVOICEINSIGHT_URL: http://host.docker.internal:8055/mcp
      TP_CLAMAV_HOST: taskpilot-clamav-dev
      TP_MCP_BASE_DIR: /app
    volumes:
      - int-uploads:/app/uploads
      - int-exports:/tmp/taskpilot-exports
      - ${HOME}/.hermes:/home/taskpilot/.hermes
      - ${HOME}/OneDrive/Finanzen/Kreditoren:${HOME}/OneDrive/Finanzen/Kreditoren:ro
    # no-new-privileges deaktiviert: Kernel 6.17-nvidia blockt jede exec mit diesem Flag
    # Security durch non-root User (taskpilot) + Cloudflare Zero Trust gewährleistet
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-int:
    build:
      context: ../src/frontend
      dockerfile: ../../docker/Dockerfile.frontend
      args:
        CACHEBUST: ${CACHEBUST:-1}
    container_name: taskpilot-frontend-int
    ports:
      - "127.0.0.1:3100:80"
    environment:
      BACKEND_HOST: backend-int
    depends_on:
      backend-int:
        condition: service_healthy
    restart: unless-stopped

volumes:
  int-uploads:
  int-exports:
