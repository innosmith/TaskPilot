# LiteLLM Proxy Configuration -- TaskPilot LLM Gateway
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# Alle Cloud-LLM-Aufrufe (Hermes + Backend) gehen ueber diesen Proxy.
# Modell-String im Request bestimmt das Routing:
#   ollama/* → Ollama lokal
#   anthropic/* → Anthropic Cloud
#   openai/* → OpenAI Cloud
#   gemini/* → Google Gemini Cloud

model_list:
  # ── Lokale Modelle (Ollama) — Wildcard mit api_base ─────────
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      api_base: http://host.docker.internal:11434

  # ── Cloud-Provider — generischer Passthrough ────────────────
  # Deckt automatisch jedes Modell ab, das die UI-Liste anbietet.
  - model_name: "openai/*"
    litellm_params:
      model: "openai/*"
      api_key: os.environ/TP_OPENAI_API_KEY

  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: os.environ/TP_ANTHROPIC_API_KEY

  - model_name: "gemini/*"
    litellm_params:
      model: "gemini/*"
      api_key: os.environ/TP_GEMINI_API_KEY

  - model_name: "perplexity/*"
    litellm_params:
      model: "perplexity/*"
      api_key: os.environ/TP_PERPLEXITY_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 120
  cache: false
