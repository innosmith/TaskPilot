# Production Environment: Standalone (eigene Postgres, Backend, Frontend)
# Nutzt shared LiteLLM + Ollama vom Host
#
# Starten mit:
#   docker compose -f docker/docker-compose.prod.yml up -d
#
# Oder via Makefile: make prod

services:
  postgres-prod:
    image: pgvector/pgvector:pg16
    container_name: taskpilot-postgres-prod
    ports:
      - "127.0.0.1:5437:5432"
    environment:
      POSTGRES_USER: ${TP_DB_USER}
      POSTGRES_PASSWORD: ${TP_DB_PASSWORD}
      POSTGRES_DB: ${TP_DB_NAME}
    volumes:
      - ${HOME}/.local/share/taskpilot/postgres/prod:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../db/seed-prod.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TP_DB_USER} -d ${TP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-prod:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: taskpilot-backend-prod
    ports:
      - "127.0.0.1:8200:8000"
    env_file: ../.env.prod
    environment:
      TP_APP_ENV: prod
      TP_DB_HOST: postgres-prod
      TP_DB_PORT: "5432"
      TP_LITELLM_BASE_URL: http://host.docker.internal:4000
      TP_OLLAMA_BASE_URL: http://host.docker.internal:11434
      TP_INVOICEINSIGHT_URL: http://host.docker.internal:8055/mcp
      TP_CLAMAV_HOST: clamav
    volumes:
      - prod-uploads:/app/uploads
      - prod-exports:/tmp/taskpilot-exports
      - ${HOME}/.nanobot/workspace:/home/taskpilot/.nanobot/workspace
      - ${HOME}/OneDrive/Finanzen/Kreditoren:${HOME}/OneDrive/Finanzen/Kreditoren:ro
    # no-new-privileges deaktiviert: Kernel 6.17-nvidia blockt jede exec mit diesem Flag
    # Security durch non-root User (taskpilot) + Cloudflare Zero Trust gewaehrleistet
    depends_on:
      postgres-prod:
        condition: service_healthy
      clamav:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend-prod:
    build:
      context: ../src/frontend
      dockerfile: ../../docker/Dockerfile.frontend
      args:
        CACHEBUST: ${CACHEBUST:-1}
    container_name: taskpilot-frontend-prod
    ports:
      - "127.0.0.1:3200:80"
    environment:
      BACKEND_HOST: backend-prod
    depends_on:
      backend-prod:
        condition: service_healthy
    restart: unless-stopped

  clamav:
    image: clamav/clamav-debian:unstable
    container_name: taskpilot-clamav
    volumes:
      - clamav-data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc localhost 3310 | grep -q PONG"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  prod-uploads:
    name: taskpilot-prod-uploads
  prod-exports:
    name: taskpilot-prod-exports
  clamav-data:
    name: taskpilot-clamav-data
